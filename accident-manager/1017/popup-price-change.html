<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width" />
  <meta name="format-detection" content="telephone=no" />
  <title></title>
  <link rel="stylesheet" href="../../assets/style/common.css" type="text/css" />
  <script type="text/javascript" src="../../assets/script/jquery-3.6.1.min.js"></script>
  <script type="text/javascript" src="../../assets/script/jquery-ui.min.js"></script>
  <script type="text/javascript" src="../../assets/script/common.js"></script>

</head>

<body>

  <div class="container">

  </div>

  <!--팝업 -->
  <div id="modal-price-change" class="modal-popup active">
    <div class="modal-container">
      <div class="modal-header">
        <h2>업체 요금표 기준가<span>로
          <br />변경 가능합니다</span></h2>
        <button type="button" class="close-btn" onclick="common.popClose('#modal-price-change')"><img src="../../assets/image/ico/ico-popup-close.svg" alt="" /></button>
      </div>
      <div class="modal-content">
        <div class="modal-form-container">
          <div class="modal-form-item">
            <input type="text" class="text-input" placeholder="예) 150,000" />
          </div>
          <div class="modal-description">기준가 변경 요금표를 사업자 등록 수정에서 업로드 해야
            <br />해당 요금표가 전송됩니다.</div>
        </div>
        <div class="button-group">
          <button class="btn btn-primary">입력하기</button>
        </div>
      </div>
    </div>
  </div>
</body>

</html>

<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width" />
  <meta name="format-detection" content="telephone=no" />
  <title></title>
  <link rel="stylesheet" href="../../assets/style/common.css" type="text/css" />
  <script type="text/javascript" src="../../assets/script/jquery-3.6.1.min.js"></script>
  <script type="text/javascript" src="../../assets/script/jquery-ui.min.js"></script>
  <script type="text/javascript" src="../../assets/script/common.js"></script>

</head>

<body>

  <div class="container">

  </div>

  <!--팝업 -->
  <div id="modal-car-return" class="modal-popup active">
    <div class="modal-container">
      <div class="modal-header">
        <h2>차량반납</h2>
        <button type="button" class="close-btn" onclick="common.popClose('#modal-car-return')"><img src="../../assets/image/ico/ico-popup-close.svg" alt="" /></button>
      </div>
      <div class="modal-content">
        <div class="modal-form-container">
          <div class="modal-form-item">
            <input type="text" class="text-input" />
          </div>
          <div class="modal-form-item">
            <div class="label">배차시 유류량 (%)<span>*</span></div>
            <input type="text" class="text-input" readonly value="50" />
          </div>
          <div class="modal-form-item">
            <div class="label">반납시 유류량 (%)<span>*</span></div>
            <input type="text" class="text-input" />
          </div>
          <div class="modal-form-item">
            <div class="label">배차시 km<span>*</span></div>
            <input type="text" class="text-input" readonly value="50" />
          </div>
          <div class="modal-form-item">
            <div class="label">반납시 km<span>*</span></div>
            <input type="text" class="text-input" />
          </div>
        </div>
        <div class="button-group">
          <button class="btn btn-primary">반납완료</button>
        </div>
      </div>
    </div>
  </div>
</body>

</html>

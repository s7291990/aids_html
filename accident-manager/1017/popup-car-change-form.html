<!DOCTYPE html>
<html>

  <meta name="viewport"

  <title></title>
  <link rel="stylesheet" href="../../assets/style/common.css" type="text/css" />
  <script type="text/javascript" src="../../assets/script/jquery-3.6.1.min.js"></script>

<body>

  <div class="container">

  </div>

      <div class="modal-content">

        <div class="form-container type01">

            <h2>반납정보</h2>

          <div class="form-rela">

              <div class="form-fields-container">

                <div class="form-field">

                    <span class="label-text">배차 일시</span>
                    <span class="required">*</span>
                  </div>
                  <div class="input-container">
                    <input type="text" value="2024-10-29 13:15" readonly class="text-input">
                  </div>
                </div>

                <div class="form-field">
                  <div class="field-label">
                    <span class="label-text">반납 일시</span>
                    <span class="required">*</span>
                  </div>
                  <div class="input-container">
                    <input type="text" value="2024-10-29 13:15" readonly class="text-input">
                  </div>
                </div>

                <div class="form-field">
                  <div class="field-label">
                    <span class="label-text">대여기간</span>
                  </div>
                  <div class="form-rows-container">
                    <div class="input-container">
                      <input type="text" class="text-input" value="8">

                      <input type="text" class="text-input" value="8">

                      <input type="text" class="text-input" value="8">

                  </div>
                </div>

              </div>
            </div>

            <div class="form-section">

              <div class="form-fields-container">
                <div class="form-field">
                  <div class="field-label">
                    <span class="label-text">배차시 유류량</span>
                    <span class="required">*</span>
                  </div>
                  <div class="input-container">
                    <input type="text" value="22" class="text-input" readonly />
                  </div>
                </div>

                <div class="form-field">
                  <div class="field-label">
                    <span class="label-text">반납시 유류량</span>
                    <span class="required">*</span>
                  </div>
                  <div class="input-container">
                    <input type="text" value="22" class="text-input" />

                </div>

                <div class="form-field">
                  <div class="field-label">

                  <div class="input-container">
                    <input type="text" value="22" class="text-input" />

                    <span class="label-text">반납시 km</span>

          <div class="form-rela">
            <div class="form-section">
              <div class="form-fields-container">
                <div class="form-field">

                    <span class="label-text">배차 일시</span>

                  </div>
                </div>

                <div class="form-field">

                      <input type="text" placeholder="101호1029" class="text-input" readonly>

                    <div class="input-container">

                        <label for="file-input-02">

                            </li>
                            <li>
                              <img src="../../assets/image/etc/etc-upload-img01.png">
                              <button type="button">

                            </li>
                            <li>

                              <button type="button">

                            </li>
                            <li>
                              <img src="../../assets/image/etc/etc-upload-img01.png">
                              <button type="button">
                                <img src="../../assets/image/ico/ico-file-remove.svg">
                              </button>
                            </li>
                            <li>
                              <img src="../../assets/image/etc/etc-upload-img01.png">
                              <button type="button">
                                <img src="../../assets/image/ico/ico-file-remove.svg">
                              </button>
                            </li>
                            <li>
                              <img src="../../assets/image/etc/etc-upload-img01.png">

                                <img src="../../assets/image/ico/ico-file-remove.svg">

        <div class="button-group">

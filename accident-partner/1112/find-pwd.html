<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width" />
  <meta name="format-detection" content="telephone=no" />
  <title></title>
  <link rel="stylesheet" href="../../assets/style/billboard.css" type="text/css" />
  <link rel="stylesheet" href="../../assets/style/common.css" type="text/css" />

  <script type="text/javascript" src="../../assets/script/jquery-3.6.1.min.js"></script>
  <script type="text/javascript" src="../../assets/script/jquery-ui.min.js"></script>
  <script type="text/javascript" src="../../assets/script/common.js"></script>
  <script type="text/javascript" src="../../assets/script/lib/d3.v6.min.js"></script>
  <script type="text/javascript" src="../../assets/script/lib/billboard-3.8.js"></script>
  <script type="text/javascript" src="../../assets/script/lib/jquery.easypiechart.js"></script>

</head>

<body>

  <div class="login-container">
    <div class="login-form-container">
      <h1><img src="../../assets/image/etc/etc-login-logo.png" /></h1>
      <div class="member-title">비밀번호 찾기를 위해
        <br />개인정보를 입력해 주세요.</div>
      <div class="form-item">
        <div class="form-label-container">아이디<span>*</span></div>
        <input type="text" class="text-input" placeholder="아이디를 입력해주세요." />
      </div>
      <div class="form-item">
        <div class="form-label-container">휴대폰 번호<span>*</span></div>
        <div class="auth-container">
          <input type="password" class="text-input" placeholder="‘-’없이 숫자만 입력" />
          <button type="button" class="btn-auth">인증 요청</button>
        </div>
      </div>
      <button type="button" class="btn btn-primary full-type">로그인</button>
      <button type="button" class="btn btn-cancel full-type">취소</button>

    </div>
  </div>

</body>

</html>
